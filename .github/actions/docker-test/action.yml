name: 'Multi-Platform Docker Test'
description: 'Download test data and run Docker image on multiple platforms using native runners'
inputs:
  image-name:
    description: 'Docker image name'
    required: true
  tag-name:
    description: 'Docker image tag'
    required: true
  test-data-urls:
    description: 'Newline-separated list of test data URLs (tar.gz files)'
    required: true
  dockerhub-username:
    description: 'DockerHub username for image pulling'
    required: true
  current-platform:
    description: 'Current platform (linux/amd64 or linux/arm64)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Download and extract test data
      shell: bash
      run: |
        echo "Downloading test data for ${{ inputs.current-platform }}..."

        # Read URLs into array
        mapfile -t URLS <<< "${{ inputs.test-data-urls }}"

        # Track extracted directories for later use
        EXTRACTED_DIRS=()

        for url in "${URLS[@]}"; do
          # Skip empty lines
          [[ -z "$url" ]] && continue

          # Extract filename from URL
          filename=$(basename "$url")
          # Remove .tar.gz to get directory name
          dirname="${filename%.tar.gz}"

          echo "Downloading: $url"
          wget -q -O "$filename" "$url"

          echo "Extracting: $filename"
          tar -xf "$filename"

          echo "Contents of $dirname:"
          ls -la "$dirname/"

          EXTRACTED_DIRS+=("$dirname")
        done

        # Save directory list for subsequent steps
        printf '%s\n' "${EXTRACTED_DIRS[@]}" > /tmp/test_data_dirs.txt

    - name: Pull Docker image for current platform
      shell: bash
      run: |
        echo "Pulling image for ${{ inputs.current-platform }}..."
        docker pull ${{ inputs.dockerhub-username }}/${{ inputs.image-name }}:${{ inputs.tag-name }}

    - name: Run Docker container tests
      shell: bash
      run: |
        echo "Running tests on ${{ inputs.current-platform }}..."

        test_num=1
        while IFS= read -r dirname; do
          [[ -z "$dirname" ]] && continue

          echo "=========================================="
          echo "Running test $test_num ($dirname)..."
          echo "=========================================="

          docker run --rm \
            -v "$(pwd)/$dirname:/ngen/ngen/data" \
            ${{ inputs.dockerhub-username }}/${{ inputs.image-name }}:${{ inputs.tag-name }} \
            /ngen/ngen/data auto

          echo "Test $test_num completed successfully"
          ((test_num++))
        done < /tmp/test_data_dirs.txt

    - name: Verify platform architecture
      shell: bash
      run: |
        echo "Verifying container architecture..."
        docker run --rm --entrypoint="/bin/bash" ${{ inputs.dockerhub-username }}/${{ inputs.image-name }}:${{ inputs.tag-name }} -c "uname -m"

    - name: Cleanup test data
      if: always()
      shell: bash
      run: |
        echo "Cleaning up test data..."
        if [[ -f /tmp/test_data_dirs.txt ]]; then
          while IFS= read -r dirname; do
            [[ -z "$dirname" ]] && continue
            rm -rf "$dirname"*
          done < /tmp/test_data_dirs.txt
          rm -f /tmp/test_data_dirs.txt
        fi
