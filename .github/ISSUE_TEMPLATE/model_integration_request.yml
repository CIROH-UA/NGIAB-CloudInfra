name: Model Integration Checklist for NGIAB
description: Submit a model for review and integration into NGIAB.
title: "[Model Integration]: "
labels: ["model-integration", "needs-review", "NGIAB"]
body:
  - type: markdown
    attributes:
      value: |
        ## Model Integration Checklist for NGIAB
        Complete this form to provide the technical, operational, and documentation details required for NGIAB model integration review.

  - type: markdown
    attributes:
      value: "### 1. Contributor Information"

  - type: input
    id: contributor-name
    attributes:
      label: Name
      placeholder: "e.g. Jane Doe"
    validations:
      required: true

  - type: input
    id: contributor-email
    attributes:
      label: Email
      placeholder: "e.g. jane.doe@example.org"
    validations:
      required: true

  - type: input
    id: contributor-organization
    attributes:
      label: Institution or Organization
      placeholder: "e.g. University of Alabama"
    validations:
      required: true

  - type: input
    id: github-username
    attributes:
      label: GitHub Username
      placeholder: "e.g. janedoe"
    validations:
      required: false

  - type: input
    id: model-name
    attributes:
      label: Model Name
      placeholder: "e.g. Example Hydrologic Model"
    validations:
      required: true

  - type: input
    id: model-version
    attributes:
      label: Model Version
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: input
    id: date-submitted
    attributes:
      label: Date Submitted
      placeholder: "e.g. 2026-03-30"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### 2. Model Overview"

  - type: textarea
    id: model-description
    attributes:
      label: Model Description
      description: Provide a brief description of what the model does.
      placeholder: Summarize the model's purpose and major capabilities.
    validations:
      required: true

  - type: checkboxes
    id: model-type
    attributes:
      label: Model Type
      description: Select all that apply.
      options:
        - label: Hydrologic Process Model
        - label: Routing Model
        - label: Forcing Engine
        - label: Calibration Tool
        - label: Post-processing Tool
        - label: Other

  - type: input
    id: model-type-other
    attributes:
      label: Other Model Type
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: checkboxes
    id: programming-languages
    attributes:
      label: Programming Language(s)
      options:
        - label: C/C++
        - label: Fortran
        - label: Python
        - label: Other

  - type: input
    id: programming-language-other
    attributes:
      label: Other Programming Language
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: textarea
    id: primary-use-case
    attributes:
      label: Primary Use Case
      placeholder: Describe the intended use case for the model.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### 3. Technical Requirements"

  - type: dropdown
    id: bmi-implementation
    attributes:
      label: BMI Implementation Status
      options:
        - Yes - Full BMI implementation
        - Partial
        - No
    validations:
      required: true

  - type: input
    id: bmi-details
    attributes:
      label: BMI Details
      description: If BMI support is partial or planned, describe the scope or plan.
      placeholder: List implemented functions or planned BMI work.
    validations:
      required: false

  - type: checkboxes
    id: bmi-language-binding
    attributes:
      label: BMI Language Binding
      options:
        - label: C
        - label: C++
        - label: Fortran
        - label: Python
        - label: Other

  - type: input
    id: bmi-language-binding-other
    attributes:
      label: Other BMI Language Binding
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: textarea
    id: required-libraries
    attributes:
      label: Required Libraries
      description: List required libraries and versions.
      placeholder: |
        NetCDF >= 4.8.0
        HDF5 >= 1.12.0
        MPICH >= 3.4
    validations:
      required: true

  - type: textarea
    id: system-dependencies
    attributes:
      label: System Dependencies
      placeholder: List any required system-level packages, modules, or tools.
    validations:
      required: false

  - type: textarea
    id: python-packages
    attributes:
      label: Python Packages
      description: If applicable, provide packages in requirements.txt style.
      placeholder: |
        numpy>=1.26
        pandas>=2.2
    validations:
      required: false

  - type: checkboxes
    id: build-system-used
    attributes:
      label: Build System Used
      options:
        - label: CMake
        - label: Make
        - label: Autotools
        - label: Python setuptools
        - label: Other

  - type: input
    id: build-system-other
    attributes:
      label: Other Build System
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: input
    id: build-instructions-link
    attributes:
      label: Build Instructions Link
      description: Provide a link if build instructions already exist.
      placeholder: "e.g. https://github.com/org/repo#build"
    validations:
      required: false

  - type: checkboxes
    id: build-help-needed
    attributes:
      label: Build Instructions Status
      options:
        - label: Build instructions are provided
        - label: Need assistance with build instructions

  - type: textarea
    id: compilation-flags
    attributes:
      label: Compilation Flags or Options
      placeholder: List any special compilation flags or requirements.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### 4. Code Repository"

  - type: input
    id: repository-url
    attributes:
      label: Repository URL
      placeholder: "e.g. https://github.com/org/repo"
    validations:
      required: true

  - type: dropdown
    id: repository-access
    attributes:
      label: Repository Access
      options:
        - Public
        - Private
    validations:
      required: true

  - type: input
    id: license
    attributes:
      label: License
      description: If proprietary, explain any restrictions.
      placeholder: "e.g. BSD-3-Clause or Proprietary - internal use only"
    validations:
      required: true

  - type: input
    id: branch-tag
    attributes:
      label: Branch or Tag for Integration
      placeholder: "e.g. main or v1.2.0"
    validations:
      required: true

  - type: checkboxes
    id: documentation-available
    attributes:
      label: Documentation Available
      options:
        - label: README with basic usage
        - label: Installation guide
        - label: API or BMI documentation
        - label: Configuration file documentation
        - label: Example or tutorial
        - label: Scientific documentation or paper

  - type: textarea
    id: documentation-links
    attributes:
      label: Documentation Links
      placeholder: Provide links to documentation resources.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### 5. Configuration and Data Requirements"

  - type: textarea
    id: input-file-formats
    attributes:
      label: Input File Formats
      placeholder: |
        NetCDF (.nc)
        CSV (.csv)
        Binary (.bin)
    validations:
      required: true

  - type: textarea
    id: required-input-variables
    attributes:
      label: Required Input Variables
      description: Include units for each variable.
      placeholder: |
        Precipitation (mm/hr)
        Temperature (deg C)
        Soil moisture (-)
    validations:
      required: true

  - type: dropdown
    id: sample-input-data-provided
    attributes:
      label: Sample Input Data Provided
      options:
        - Yes
        - No
        - Can provide upon request
    validations:
      required: true

  - type: input
    id: sample-input-data-link
    attributes:
      label: Sample Input Data Link
      placeholder: "e.g. https://example.org/input-data"
    validations:
      required: false

  - type: textarea
    id: output-file-formats
    attributes:
      label: Output File Formats
      placeholder: List expected output file formats.
    validations:
      required: true

  - type: textarea
    id: output-variables
    attributes:
      label: Output Variables
      description: Include units for each output variable.
      placeholder: List output variables and units.
    validations:
      required: true

  - type: dropdown
    id: output-frequency
    attributes:
      label: Output Frequency
      options:
        - Sub-hourly
        - Hourly
        - Daily
        - Other
    validations:
      required: true

  - type: input
    id: output-frequency-details
    attributes:
      label: Output Frequency Details
      placeholder: Provide details if Sub-hourly or Other was selected.
    validations:
      required: false

  - type: checkboxes
    id: configuration-file-format
    attributes:
      label: Configuration File Format
      options:
        - label: JSON
        - label: YAML
        - label: INI
        - label: Custom text format
        - label: Other

  - type: input
    id: configuration-file-format-other
    attributes:
      label: Other Configuration File Format
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: dropdown
    id: sample-configuration-provided
    attributes:
      label: Sample Configuration Provided
      options:
        - Yes
        - No
        - Can provide
    validations:
      required: true

  - type: input
    id: sample-configuration-link
    attributes:
      label: Sample Configuration Link
      placeholder: "e.g. https://example.org/config"
    validations:
      required: false

  - type: dropdown
    id: configuration-parameters-documented
    attributes:
      label: Configuration Parameters Documented
      options:
        - Yes
        - Partial
        - No
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### 6. Testing and Validation"

  - type: dropdown
    id: unit-tests-available
    attributes:
      label: Unit Tests Available
      options:
        - Yes
        - No
        - Plan to add
    validations:
      required: true

  - type: input
    id: unit-test-coverage
    attributes:
      label: Unit Test Coverage
      placeholder: "e.g. 75%"
    validations:
      required: false

  - type: dropdown
    id: integration-tests-available
    attributes:
      label: Integration Tests Available
      options:
        - Yes
        - No
    validations:
      required: true

  - type: dropdown
    id: test-data-included
    attributes:
      label: Test Data Included
      options:
        - Yes
        - No
        - Can provide
    validations:
      required: true

  - type: input
    id: test-data-link
    attributes:
      label: Test Data Link
      placeholder: "e.g. https://example.org/test-data"
    validations:
      required: false

  - type: dropdown
    id: model-validation-performed
    attributes:
      label: Model Validation Performed
      options:
        - Yes - Published results available
        - Yes - Internal validation only
        - In progress
        - Not yet validated
    validations:
      required: true

  - type: textarea
    id: validation-domain-region
    attributes:
      label: Validation Domain or Region
      placeholder: Describe the domains or regions where the model has been tested.
    validations:
      required: false

  - type: textarea
    id: performance-metrics
    attributes:
      label: Performance Metrics
      placeholder: |
        NSE: 0.85
        RMSE: 2.3 m^3/s
        Bias: -5%
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### 7. Container Compatibility"

  - type: dropdown
    id: base-image-preference
    attributes:
      label: Base Image Preference
      options:
        - Rocky Linux 9.1 (NGIAB default)
        - Ubuntu
        - Alpine
        - Other
    validations:
      required: true

  - type: input
    id: base-image-other
    attributes:
      label: Other Base Image
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: textarea
    id: special-container-requirements
    attributes:
      label: Special Container Requirements
      placeholder: List any GPU, memory, base image, or Dockerfile requirements.
    validations:
      required: false

  - type: dropdown
    id: hpc-compatibility-required
    attributes:
      label: HPC Compatibility Required
      options:
        - Yes
        - No
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: mpi-support
    attributes:
      label: MPI Support
      options:
        - Required
        - Optional
        - Not needed
    validations:
      required: true

  - type: checkboxes
    id: parallel-execution-support
    attributes:
      label: Parallel Execution Support
      options:
        - label: Shared memory (OpenMP)
        - label: Distributed memory (MPI)
        - label: GPU/CUDA
        - label: Serial only

  - type: markdown
    attributes:
      value: "### 8. Integration Planning"

  - type: input
    id: target-integration-date
    attributes:
      label: Target Integration Date
      placeholder: "e.g. 2026-09-01"
    validations:
      required: true

  - type: dropdown
    id: development-status
    attributes:
      label: Development Status
      options:
        - Production-ready
        - Beta or testing
        - Early development
        - Proof of concept
    validations:
      required: true

  - type: dropdown
    id: maintenance-commitment
    attributes:
      label: Maintenance Commitment
      options:
        - Will maintain long-term
        - Limited support available
        - Community maintenance
        - Unsure
    validations:
      required: true

  - type: input
    id: technical-contact-name
    attributes:
      label: Technical Point of Contact Name
      placeholder: "e.g. Jane Doe"
    validations:
      required: true

  - type: input
    id: technical-contact-email
    attributes:
      label: Technical Point of Contact Email
      placeholder: "e.g. jane.doe@example.org"
    validations:
      required: true

  - type: input
    id: preferred-contact-method
    attributes:
      label: Preferred Contact Method
      placeholder: "e.g. Email, GitHub, Slack"
    validations:
      required: false

  - type: dropdown
    id: response-time
    attributes:
      label: Expected Response Time for Issues
      options:
        - Within 24 hours
        - Within 1 week
        - Best effort
        - Other
    validations:
      required: true

  - type: input
    id: response-time-other
    attributes:
      label: Other Response Time
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: dropdown
    id: collaboration-openness
    attributes:
      label: Open to Collaboration
      options:
        - Yes - Open to contributions
        - Yes - With approval
        - Prefer to maintain independently
    validations:
      required: true

  - type: checkboxes
    id: support-needed
    attributes:
      label: CIROH or NGIAB Team Support Needed
      options:
        - label: BMI implementation assistance
        - label: Containerization help
        - label: CI/CD pipeline setup
        - label: Documentation improvement
        - label: Testing framework
        - label: Other

  - type: input
    id: support-needed-other
    attributes:
      label: Other Support Needed
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### 9. Specific NGIAB Integration"

  - type: dropdown
    id: hydrofabric-compatibility
    attributes:
      label: Works with NOAA Hydrofabric
      options:
        - Yes - Tested
        - Should work (not tested)
        - Requires modifications
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: spatial-resolution
    attributes:
      label: Spatial Resolution
      options:
        - Catchment-level
        - Grid-based
        - Point-based
        - Other
    validations:
      required: true

  - type: input
    id: spatial-resolution-details
    attributes:
      label: Spatial Resolution Details
      placeholder: Provide resolution details if Grid-based or Other was selected.
    validations:
      required: false

  - type: textarea
    id: ngiab-required-input-variables
    attributes:
      label: NGIAB-specific Required Input Variables
      description: Include units if they differ from the general input section above.
      placeholder: List NGIAB integration input variables and units.
    validations:
      required: false

  - type: checkboxes
    id: integration-level
    attributes:
      label: Integration Level
      options:
        - label: Core modeling component
        - label: Pre-processing tool
        - label: Post-processing tool
        - label: Visualization component
        - label: Evaluation tool
        - label: Other

  - type: input
    id: integration-level-other
    attributes:
      label: Other Integration Level
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: checkboxes
    id: compatibility-with-existing-components
    attributes:
      label: Compatibility with Existing Components
      options:
        - label: CFE
        - label: NOAH-OWP-Modular
        - label: TOPMODEL
        - label: t-route
        - label: Other formulations

  - type: input
    id: compatibility-other-formulations
    attributes:
      label: Other Compatible Formulations
      placeholder: List any other compatible formulations.
    validations:
      required: false

  - type: checkboxes
    id: data-sources-supported
    attributes:
      label: Data Sources Supported
      options:
        - label: NOAA forcing data
        - label: USGS observations
        - label: Custom forcing files
        - label: Other

  - type: input
    id: data-sources-supported-other
    attributes:
      label: Other Data Sources Supported
      placeholder: Complete this only if you selected Other.
    validations:
      required: false

  - type: dropdown
    id: compatible-with-preprocess-module
    attributes:
      label: Compatible with NGIAB Data Preprocess Module
      options:
        - Yes - Tested
        - Should be compatible
        - Requires adaptation
        - Not applicable
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### 10. Additional Information"

  - type: textarea
    id: related-publications
    attributes:
      label: Related Publications
      placeholder: List papers, reports, or documentation references.
    validations:
      required: false

  - type: textarea
    id: known-limitations
    attributes:
      label: Known Issues or Limitations
      placeholder: Describe known limitations or constraints.
    validations:
      required: false

  - type: textarea
    id: example-use-cases
    attributes:
      label: Example Use Cases
      placeholder: Describe one or two scenarios where this model is valuable.
    validations:
      required: false

  - type: textarea
    id: runtime-cost
    attributes:
      label: Model Runtime Cost
      description: Provide approximate time, memory, and CPU cost for representative workloads.
      placeholder: e.g. 4 CPU-hours and 16 GB RAM for 1,000 catchments over 365 timesteps.
    validations:
      required: false

  - type: textarea
    id: additional-notes
    attributes:
      label: Additional Notes
      placeholder: Include any other information that would help during review and integration.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### 11. Checklist Summary"

  - type: checkboxes
    id: pre-submission-requirements
    attributes:
      label: Pre-submission Requirements
      description: Confirm all required items are complete.
      options:
        - label: Model source code is accessible
          required: true
        - label: Basic documentation is available
          required: true
        - label: Dependencies are clearly listed
          required: true
        - label: Sample configuration file is provided
          required: true
        - label: Build instructions are included
          required: true
        - label: License is specified
          required: true
        - label: Point of contact is identified
          required: true

  - type: checkboxes
    id: recommended-items
    attributes:
      label: Recommended Items
      description: Strongly encouraged but not required.
      options:
        - label: BMI implementation is completed or in progress
        - label: Test data is available
        - label: Model has been validated in at least one domain
        - label: Compatible with NGIAB standard formats
        - label: Documentation includes usage examples

  - type: checkboxes
    id: optional-items
    attributes:
      label: Optional Items
      options:
        - label: Unit tests are included
        - label: Published validation results are available
        - label: HPC or parallel execution support is available
        - label: Integration with existing NGIAB tools has been demonstrated

  - type: markdown
    attributes:
      value: "### 12. Submission Confirmation"

  - type: checkboxes
    id: submission-confirmation
    attributes:
      label: Submission Confirmation
      options:
        - label: All required information above has been provided
          required: true
        - label: The model code is ready for review
          required: true
        - label: I am authorized to submit this model for integration
          required: true
        - label: I agree to provide reasonable support during integration
          required: true
