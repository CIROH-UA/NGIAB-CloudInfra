name: CIROH-2i2c JupyterHub Access Request
description: Request access or compute resources for the CIROH-2i2c JupyterHub.
title: "[2i2c JupyterHub Request]: "
labels: ["infrastructure", "resource-request", "2i2c"]
body:
  - type: markdown
    attributes:
      value: |
        ## CIROH-2i2c JupyterHub Access Request
        Complete this form to request access to the CIROH-2i2c JupyterHub environment.

        Helpful link:
        - JupyterHub service info: https://hub.ciroh.org/docs/services/cloudservices/2i2c/

  - type: input
    id: pi-full-name
    attributes:
      label: "PI's Full Name"
      placeholder: "e.g. Dr. Jane Doe"
    validations:
      required: true

  - type: input
    id: pi-affiliated-institute
    attributes:
      label: "PI's Affiliated Institute"
      placeholder: "e.g. University of Alabama"
    validations:
      required: true

  - type: input
    id: pi-email
    attributes:
      label: "PI's Affiliated Email Address"
      placeholder: "e.g. jdoe@ua.edu"
    validations:
      required: true

  - type: input
    id: requester-full-name
    attributes:
      label: "Requester's Full Name"
      description: Leave blank only if the requester is the same as the PI.
      placeholder: "e.g. John Smith"
    validations:
      required: true

  - type: input
    id: requester-email
    attributes:
      label: "Requester's Affiliated Email Address"
      placeholder: "e.g. jsmith@ua.edu"
    validations:
      required: true

  - type: input
    id: project-number
    attributes:
      label: CIROH Project Number
      description: As listed in Smartsheet.
      placeholder: "e.g. CIROH-2024-001"
    validations:
      required: false

  - type: input
    id: project-name
    attributes:
      label: CIROH Project Name
      placeholder: "e.g. NextGen Water Modeling Framework"
    validations:
      required: true

  - type: textarea
    id: project-description
    attributes:
      label: Project Description
      description: |
        Describe the project goals, notebooks, workflows, and collaboration needs.
      placeholder: Summarize the project and how the JupyterHub will be used.
    validations:
      required: true

  - type: input
    id: jupyterhub-github-id
    attributes:
      label: GitHub ID
      description: Required for provisioning access to the CIROH-2i2c JupyterHub environment.
      placeholder: "e.g. github-username"
    validations:
      required: true

  - type: dropdown
    id: jupyterhub-compute-type
    attributes:
      label: Compute Type Needed
      description: Select the type of compute access required on the JupyterHub.
      options:
        - "CPU"
        - "GPU"
    validations:
      required: true

  - type: input
    id: expected-users
    attributes:
      label: Number of Users Requiring Access
      placeholder: "e.g. 5"
    validations:
      required: true

  - type: textarea
    id: software-requirements
    attributes:
      label: Software and Environment Requirements
      description: List required Python packages, libraries, containers, or notebook dependencies.
      placeholder: Include any packages, environments, or notebook images needed.
    validations:
      required: true

  - type: textarea
    id: storage-data-needs
    attributes:
      label: Data Storage and Access Needs
      description: Describe datasets, storage size, and any shared folders or external data connections needed.
      placeholder: Include expected storage size and any data access requirements.
    validations:
      required: false

  - type: dropdown
    id: working-group
    attributes:
      label: Working Group
      options:
        - "Flood Inundation Mapping Working Group"
        - "Decision Support Working Group"
        - "Hydrologic Modeling and Prediction Working Group"
        - "Hydroinformatics Working Group"
        - "Early Career Working Group"
        - "Community Resources Working Group"
        - "Artificial Intelligence Working Group"
        - "Model & Forecast Evaluation Working Group"
    validations:
      required: true

  - type: input
    id: project-start-date
    attributes:
      label: Project Start Date
      placeholder: "e.g. 2026-04-01"
    validations:
      required: true

  - type: input
    id: project-end-date
    attributes:
      label: Project End Date
      placeholder: "e.g. 2027-03-31"
    validations:
      required: true

  - type: textarea
    id: timeline-details
    attributes:
      label: Timeline Details
      description: Include when access is needed and any important milestones.
      placeholder: Access needed for onboarding in April, collaboration May to November, wrap-up in December.
    validations:
      required: false

  - type: textarea
    id: security-compliance
    attributes:
      label: Security and Compliance Requirements
      placeholder: Describe any security, compliance, or data handling constraints.
    validations:
      required: false

  - type: textarea
    id: approval
    attributes:
      label: Approval
      description: Requests typically require management approval and can take 2 to 3 weeks to process.
      placeholder: Describe any required approvals or sign-offs.
    validations:
      required: false