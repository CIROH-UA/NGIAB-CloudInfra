name: GCP Cloud Resources Request
description: Request CIROH Google Cloud resources for a project.
title: "[GCP Resource Request]: "
labels: ["infrastructure", "resource-request", "gcp", "Infra Access"]
body:
  - type: markdown
    attributes:
      value: |
        ## GCP Cloud Resources Request
        Complete this form to request Google Cloud resources for a CIROH project.

        Helpful links:
        - Google Cloud overview: https://hub.ciroh.org/docs/services/cloudservices/google%20cloud/
        - Google Cloud Pricing Calculator: https://cloud.google.com/products/calculator

  - type: input
    id: pi-full-name
    attributes:
      label: "PI's Full Name"
      placeholder: "e.g. Dr. Jane Doe"
    validations:
      required: true

  - type: input
    id: pi-affiliated-institute
    attributes:
      label: "PI's Affiliated Institute"
      placeholder: "e.g. University of Alabama"
    validations:
      required: true

  - type: input
    id: pi-email
    attributes:
      label: "PI's Affiliated Email Address"
      placeholder: "e.g. jdoe@ua.edu"
    validations:
      required: true

  - type: input
    id: requester-full-name
    attributes:
      label: "Requester's Full Name"
      description: Leave blank only if the requester is the same as the PI.
      placeholder: "e.g. John Smith"
    validations:
      required: true

  - type: input
    id: requester-email
    attributes:
      label: "Requester's Affiliated Email Address"
      placeholder: "e.g. jsmith@ua.edu"
    validations:
      required: true

  - type: input
    id: project-number
    attributes:
      label: CIROH Project Number
      description: As listed in Smartsheet.
      placeholder: "e.g. CIROH-2024-001"
    validations:
      required: false

  - type: input
    id: project-name
    attributes:
      label: CIROH Project Name
      placeholder: "e.g. NextGen Water Modeling Framework"
    validations:
      required: true

  - type: textarea
    id: project-description
    attributes:
      label: Project Description
      description: |
        Describe the project goals, software, users, and expected infrastructure impact.
      placeholder: Summarize the project and why Google Cloud resources are needed.
    validations:
      required: true

  - type: textarea
    id: resource-requirements
    attributes:
      label: Google Cloud Resource Requirements
      description: Specify compute, storage, networking, and workload expectations.
      placeholder: Include VM sizing, storage needs, IAM/network needs, expected runtime, and scaling patterns.
    validations:
      required: true

  - type: checkboxes
    id: google-cloud-services
    attributes:
      label: Google Cloud Services Needed
      description: Select all required Google Cloud services.
      options:
        - label: "Google Compute Engine"
        - label: "Google BigQuery"
        - label: "Google Kubernetes Engine (GKE)"
        - label: "Google Cloud Storage"
        - label: "Google VPC"
        - label: "Google IAM"
        - label: "Google Cloud Functions"
        - label: "Dataflow"
        - label: "Other Google Cloud services"

  - type: input
    id: google-cloud-other-services
    attributes:
      label: Other Google Cloud Services
      description: Complete this only if you selected Other Google Cloud services.
      placeholder: List any additional Google Cloud services.
    validations:
      required: false

  - type: dropdown
    id: working-group
    attributes:
      label: Working Group
      options:
        - "Flood Inundation Mapping Working Group"
        - "Decision Support Working Group"
        - "Hydrologic Modeling and Prediction Working Group"
        - "Hydroinformatics Working Group"
        - "Early Career Working Group"
        - "Community Resources Working Group"
        - "Artificial Intelligence Working Group"
        - "Model & Forecast Evaluation Working Group"
    validations:
      required: true

  - type: input
    id: project-start-date
    attributes:
      label: Project Start Date
      placeholder: "e.g. 2026-04-01"
    validations:
      required: true

  - type: input
    id: project-end-date
    attributes:
      label: Project End Date
      placeholder: "e.g. 2027-03-31"
    validations:
      required: true

  - type: textarea
    id: timeline-details
    attributes:
      label: Timeline Details
      description: Include when Google Cloud resources are needed and any key milestones.
      placeholder: Setup in April, primary usage May to November, wrap-up in December.
    validations:
      required: false

  - type: textarea
    id: security-compliance
    attributes:
      label: Security and Compliance Requirements
      placeholder: Describe any security, compliance, or data handling constraints.
    validations:
      required: false

  - type: textarea
    id: cost-estimation
    attributes:
      label: GCP Cost Estimation Details
      description: Include your estimate and key assumptions.
      placeholder: Provide the estimated monthly or total GCP cost and assumptions used.
    validations:
      required: true

  - type: textarea
    id: approval
    attributes:
      label: Approval
      description: Requests typically require management approval and can take 2 to 3 weeks to process.
      placeholder: Describe any required approvals or sign-offs.
    validations:
      required: false