name: NWM BigQuery API Access Request
description: Request access to the NWM BigQuery API or related datasets.
title: "[NWM BigQuery API Request]: "
labels: ["infrastructure", "resource-request", "bigquery"]
body:
  - type: markdown
    attributes:
      value: |
        ## NWM BigQuery API Access Request
        Complete this form to request access to the NWM BigQuery API or related query resources.

        Helpful link:
        - NWM BigQuery API info: https://hub.ciroh.org/docs/products/data-management/bigquery-api/

  - type: input
    id: pi-full-name
    attributes:
      label: "PI's Full Name"
      placeholder: "e.g. Dr. Jane Doe"
    validations:
      required: true

  - type: input
    id: pi-affiliated-institute
    attributes:
      label: "PI's Affiliated Institute"
      placeholder: "e.g. University of Alabama"
    validations:
      required: true

  - type: input
    id: pi-email
    attributes:
      label: "PI's Affiliated Email Address"
      placeholder: "e.g. jdoe@ua.edu"
    validations:
      required: true

  - type: input
    id: requester-full-name
    attributes:
      label: "Requester's Full Name"
      description: Leave blank only if the requester is the same as the PI.
      placeholder: "e.g. John Smith"
    validations:
      required: true

  - type: input
    id: requester-email
    attributes:
      label: "Requester's Affiliated Email Address"
      placeholder: "e.g. jsmith@ua.edu"
    validations:
      required: true

  - type: input
    id: project-number
    attributes:
      label: CIROH Project Number
      description: As listed in Smartsheet.
      placeholder: "e.g. CIROH-2024-001"
    validations:
      required: false

  - type: input
    id: project-name
    attributes:
      label: CIROH Project Name
      placeholder: "e.g. NextGen Water Modeling Framework"
    validations:
      required: true

  - type: textarea
    id: project-description
    attributes:
      label: Project Description
      description: |
        Describe the project goals and how NWM BigQuery data or API access will be used.
      placeholder: Summarize the project and intended BigQuery usage.
    validations:
      required: true

  - type: input
    id: account-email
    attributes:
      label: Google Account or Service Account Email
      description: Enter the identity that needs BigQuery access.
      placeholder: "e.g. analyst@ua.edu or service-account@project.iam.gserviceaccount.com"
    validations:
      required: true

  - type: textarea
    id: dataset-needs
    attributes:
      label: Dataset and Access Needs
      description: Describe the datasets, tables, or API endpoints required and the level of access needed.
      placeholder: List the BigQuery datasets or API access patterns needed for this project.
    validations:
      required: true

  - type: textarea
    id: usage-patterns
    attributes:
      label: Expected Query Volume and Usage Patterns
      description: Describe how often queries will run, expected data volumes, and whether access is interactive or automated.
      placeholder: Daily automated queries, monthly analysis, expected query size, and any batch workflows.
    validations:
      required: true

  - type: input
    id: gcp-project-id
    attributes:
      label: Google Cloud Project ID
      description: If applicable, provide the GCP project that will be used for BigQuery access or billing.
      placeholder: "e.g. ciroh-analysis-project"
    validations:
      required: false

  - type: dropdown
    id: working-group
    attributes:
      label: Working Group
      options:
        - "Flood Inundation Mapping Working Group"
        - "Decision Support Working Group"
        - "Hydrologic Modeling and Prediction Working Group"
        - "Hydroinformatics Working Group"
        - "Early Career Working Group"
        - "Community Resources Working Group"
        - "Artificial Intelligence Working Group"
        - "Model & Forecast Evaluation Working Group"
    validations:
      required: true

  - type: input
    id: project-start-date
    attributes:
      label: Project Start Date
      placeholder: "e.g. 2026-04-01"
    validations:
      required: true

  - type: input
    id: project-end-date
    attributes:
      label: Project End Date
      placeholder: "e.g. 2027-03-31"
    validations:
      required: true

  - type: textarea
    id: timeline-details
    attributes:
      label: Timeline Details
      description: Include when access is needed and any important milestones.
      placeholder: Access needed for setup in April, active analysis May to November, wrap-up in December.
    validations:
      required: false

  - type: textarea
    id: security-compliance
    attributes:
      label: Security and Compliance Requirements
      placeholder: Describe any security, compliance, or data handling constraints.
    validations:
      required: false

  - type: textarea
    id: approval
    attributes:
      label: Approval
      description: Requests typically require management approval and can take 2 to 3 weeks to process.
      placeholder: Describe any required approvals or sign-offs.
    validations:
      required: false