# plankset_conf.yml
# Configuration for the set of plug-ins applied by dev.sh.

# Editing these values is not recommended,
# as doing so may interfere with the dev.sh script.

# Name of this plankset.
# Value required.
plankset_name: NGIAB_CloudInfra

# Whether to separate new plank content into distinct build stages.
# If true, then each build stage may have only one plankgap,
# and only at the end of the build stage.
# Value required.
apply_nested_stages: true

# The location of the target dockerfile to modify.
# Value required.
target_path: "../docker/Dockerfile"

# The destination to write the modified dockerfile to.
# Value required.
destination_path: "./Dockerfile"

# Which directory to read the planks from.
# Value required. ("./" strongly recommended.)
planks_path: "./"

# Which plank ids from the directory to exclude, as a YAML list.
# If not set, defaults to an empty list.
exclude:
- template